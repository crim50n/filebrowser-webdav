name: Continuous Integration

on:
  push:
    branches:
      - "master"
    tags:
      - "v*-webdav.*"
  pull_request:

permissions:
  contents: read

jobs:
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve base upstream tag
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-webdav\.[0-9]+$ ]]; then
              echo "BASE_TAG=${GITHUB_REF_NAME%-webdav.*}" >> "$GITHUB_ENV"
            else
              echo "invalid release tag format: ${GITHUB_REF_NAME}" >&2
              exit 1
            fi
          else
            echo "BASE_TAG=$(cat .upstream-default-tag)" >> "$GITHUB_ENV"
          fi

      - name: Prepare patched source
        run: ./scripts/prepare-source.sh "$BASE_TAG"

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: ".upstream-src/frontend/package.json"
      - uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          cache: "pnpm"
          cache-dependency-path: ".upstream-src/frontend/pnpm-lock.yaml"
      - working-directory: .upstream-src/frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm run lint

  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve base upstream tag
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-webdav\.[0-9]+$ ]]; then
              echo "BASE_TAG=${GITHUB_REF_NAME%-webdav.*}" >> "$GITHUB_ENV"
            else
              echo "invalid release tag format: ${GITHUB_REF_NAME}" >&2
              exit 1
            fi
          else
            echo "BASE_TAG=$(cat .upstream-default-tag)" >> "$GITHUB_ENV"
          fi

      - name: Prepare patched source
        run: ./scripts/prepare-source.sh "$BASE_TAG"

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
      - uses: golangci/golangci-lint-action@v9
        with:
          version: "latest"
          working-directory: ".upstream-src"

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve base upstream tag
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-webdav\.[0-9]+$ ]]; then
              echo "BASE_TAG=${GITHUB_REF_NAME%-webdav.*}" >> "$GITHUB_ENV"
            else
              echo "invalid release tag format: ${GITHUB_REF_NAME}" >&2
              exit 1
            fi
          else
            echo "BASE_TAG=$(cat .upstream-default-tag)" >> "$GITHUB_ENV"
          fi

      - name: Prepare patched source
        run: ./scripts/prepare-source.sh "$BASE_TAG"

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
      - working-directory: .upstream-src
        run: go test --race ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve base upstream tag
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-webdav\.[0-9]+$ ]]; then
              echo "BASE_TAG=${GITHUB_REF_NAME%-webdav.*}" >> "$GITHUB_ENV"
            else
              echo "invalid release tag format: ${GITHUB_REF_NAME}" >&2
              exit 1
            fi
          else
            echo "BASE_TAG=$(cat .upstream-default-tag)" >> "$GITHUB_ENV"
          fi

      - name: Prepare patched source
        run: ./scripts/prepare-source.sh "$BASE_TAG"

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: ".upstream-src/frontend/package.json"
      - uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          cache: "pnpm"
          cache-dependency-path: ".upstream-src/frontend/pnpm-lock.yaml"
      - name: Install Task
        uses: go-task/setup-task@v1
      - working-directory: .upstream-src
        run: task build

  release:
    name: Release
    needs: ["lint-frontend", "lint-backend", "test", "build"]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve base upstream tag
        run: |
          if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-webdav\.[0-9]+$ ]]; then
            echo "BASE_TAG=${GITHUB_REF_NAME%-webdav.*}" >> "$GITHUB_ENV"
          else
            echo "invalid release tag format: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Prepare patched source
        run: ./scripts/prepare-source.sh "$BASE_TAG"

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: ".upstream-src/frontend/package.json"
      - uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          cache: "pnpm"
          cache-dependency-path: ".upstream-src/frontend/pnpm-lock.yaml"
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Install Task
        uses: go-task/setup-task@v1
      - working-directory: .upstream-src
        run: task build:frontend

      - name: Login to GitHub Container Registry (retry)
        run: |
          for attempt in 1 2 3; do
            if echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin; then
              exit 0
            fi
            sleep $((attempt * 10))
          done
          exit 1

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
          workdir: .upstream-src
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
